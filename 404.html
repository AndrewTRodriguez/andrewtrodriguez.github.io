<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting to andrewtrodriguez.com</title>
  <link rel="canonical" href="https://andrewtrodriguez.com/" />
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="0; url=https://andrewtrodriguez.com/" />
  <script>
    (function () {
      var target = "https://andrewtrodriguez.com" + window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>This site has moved to <a href="https://andrewtrodriguez.com/">andrewtrodriguez.com</a>.</p>
</body>
</html>
